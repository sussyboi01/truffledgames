name: Generate Name-ID JSON

on:
  push:
    paths:
      - 'games.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate name-id.json
        run: |
          python3 << 'EOF'
          import json

          with open('games.json', 'r') as f:
              data = json.load(f)

          games = data.get("games", [])

          output = []
          for i, game in enumerate(games, start=1):
              output.append({
                  "name": game.get("name"),
                  "id": i
              })

          with open('name-id.json', 'w') as f:
              json.dump(output, f, indent=2)

          EOF

      - name: Commit generated file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add name-id.json
          git commit -m "Auto-generate name-id.json" || echo "No changes"
          git push
