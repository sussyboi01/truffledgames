<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<title>Unity WebGL Player | Kindergarten3</title>
	</head>
	<body
		style="text-align: center; padding: 0; border: 0; margin: 0; height: 100vh"
	>
		<canvas
			id="unity-canvas"
			width="100%"
			height="100%"
			tabindex="-1"
			style="width: 100%; height: 100%; background: #000000"
		></canvas>
		<script src="Build/Kindergarten3Port.loader.js"></script>
		    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

    </style>
	  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PXHK7Q7G3Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PXHK7Q7G3Z');
</script>
		<script>
			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				var meta = document.createElement("meta");
				meta.name = "viewport";
				meta.content =
					"width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
				document.getElementsByTagName("head")[0].appendChild(meta);

				var canvas = document.querySelector("#unity-canvas");
				canvas.style.width = "100%";
				canvas.style.height = "100%";
				canvas.style.position = "fixed";

				document.body.style.textAlign = "left";
			}

			createUnityInstance(document.querySelector("#unity-canvas"), {
				dataUrl: "Build/Kindergarten3Port.data",
				frameworkUrl: "Build/Kindergarten3Port.framework.js",
				codeUrl: "Build/Kindergarten3Port.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Con Man Games",
				productName: "Kindergarten3",
				productVersion: "0.01",
				// matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
				// devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
			});
		</script>
	</body>
</html>
