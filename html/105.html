<script>
  (function() {
    var OrigAudioContext = window.AudioContext || window.webkitAudioContext;
    if (OrigAudioContext) {
      var origCreateGain = OrigAudioContext.prototype.createGain;

      class MutedAudioContext extends OrigAudioContext {
        constructor() {
          super(...arguments);
          var mute = origCreateGain.call(this);
          mute.gain.value = 0;
          mute.connect(super.destination);
          this._muteNode = mute;
        }
        get destination() {
          return this._muteNode;
        }
      }

      window.AudioContext = MutedAudioContext;
      window.webkitAudioContext = MutedAudioContext;
    }

    var origPlay = HTMLMediaElement.prototype.play;
    HTMLMediaElement.prototype.play = function() {
      this.muted = true;
      this.volume = 0;
      return origPlay.call(this);
    };

    var OrigAudio = window.Audio;
    window.Audio = function() {
      var a = new OrigAudio(...arguments);
      a.muted = true;
      a.volume = 0;
      return a;
    };
    window.Audio.prototype = OrigAudio.prototype;
  })();
</script>

  <script>
    const audio = document.getElementById('drone');
    audio.muted = true;
    audio.volume = 0;
    const mute = document.getElementById('mute');
    let gamestarted = false;

    function updateButton() {}

    function loadChapter(chapter) {
      fetch(`chapter${chapter}/index.html`).then(res => res.text()).then(html => {
        gamestarted = true;
        document.documentElement.innerHTML = html;
        document.documentElement.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
    }

    const menumoveaudio = new Audio('audios/snd_menumove.mp3');
    const menuselectaudio = new Audio('audios/snd_select.mp3');
    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        if (!gamestarted) {
          menumoveaudio.play();
          if (selectedChapter) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          }
        }
      });
      row.addEventListener('click', () => {
        if (!gamestarted) {
          menuselectaudio.play();
        }
      });
    });

    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
      if (event.key === 'ArrowUp') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
          menumoveaudio.play();
        } else {
          document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          selectedChapter--;
          if (selectedChapter < 0) {
            selectedChapter = document.querySelectorAll('.row').length - 1;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          menumoveaudio.play();
        }
      } else if (event.key === 'ArrowDown') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
          menumoveaudio.play();
        } else {
          if (selectedChapter+1 >= document.querySelectorAll('.row').length) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = 0;
            document.querySelectorAll('.row')[0].classList.add("selected");
            menumoveaudio.play();
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter++;
            document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
            menumoveaudio.play();
          }
        }
      } else if (event.key === 'Enter') {
        if (selectedChapter !== null) {
          window.location.href = document.querySelectorAll('.row')[selectedChapter].href;
          menuselectaudio.play();
        }
      }
      }
    });
  </script>
