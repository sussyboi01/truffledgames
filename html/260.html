<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Unity WebGL Player | Running Fred</title>
  <script src="TemplateData/UnityProgress.js"></script>
  <script src="Build/UnityLoader.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PXHK7Q7G3Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PXHK7Q7G3Z');

  <script>
    var gameInstance;
    window.onload = function() {
      gameInstance = UnityLoader.instantiate("gameContainer", "Build/Running Fred.json", {onProgress: UnityProgress});
    };
    function goFullscreen() {
      if (gameInstance && gameInstance.SetFullscreen) gameInstance.SetFullscreen(1);
    }
  </script>
  <style>
    html,body {margin:0;padding:0;height:100%;overflow:hidden;background:#000;}
    #gameContainer {position:fixed;top:0;left:0;width:100%;height:100%;}
    .footer {
      position:fixed;bottom:10px;left:10px;right:10px;
      display:flex;align-items:center;justify-content:space-between;
      color:#fff;font-family:sans-serif;
    }
    .fullscreen {
      width:32px;height:32px;cursor:pointer;
      background:url('fullscreen.png') center/contain no-repeat;
    }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
</body>
</html>
