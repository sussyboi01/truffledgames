  <body>
    <canvas id="unity-canvas"></canvas>
    <script src="Build/daddyreeyuki.loader.js"></script>
    <script>
      const canvas = document.getElementById("unity-canvas");
      const syncCanvasSize = () => {
        canvas.width = canvas.clientWidth * devicePixelRatio;
        canvas.height = canvas.clientHeight * devicePixelRatio;
      };
      syncCanvasSize();
      new ResizeObserver(syncCanvasSize).observe(canvas);
      createUnityInstance(canvas, {
        dataUrl: "Build/daddyreeyuki.data",
        frameworkUrl: "Build/daddyreeyuki.framework.js",
        codeUrl: "Build/daddyreeyuki.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Joe Williams",
        productName: "WhosYourDaddy",
        productVersion: "1.0",
        matchWebGLToCanvasSize: false,
        devicePixelRatio: devicePixelRatio,
      }).catch(console.error);
    </script>
