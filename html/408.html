  <script id="tick-worker" type="javascript/worker">
    let running = false, stop_called = false, intervalMs = 16;
    onmessage = (e) => {
      if (e.data.run) {
        intervalMs = Math.floor(1000 / e.data.fps);
        if (!running) { running = true; setTimeout(tick, intervalMs); }
      } else { stop_called = true; }
    };
    const tick = () => {
      if (stop_called) { stop_called = false; running = false; return; }
      const start = Date.now();
      postMessage('');
      setTimeout(tick, Math.max(0, start + intervalMs - Date.now()));
    };
  </script>

  <script>
    const blob = new Blob([document.querySelector('#tick-worker').textContent]);
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = () => GM_tick(performance.now());

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    const canvasElement = document.getElementById("canvas");

    const outputContainerElement = document.getElementById("output-container");

    const messagesElement = document.getElementById("messages");

    let startingHeight, startingWidth, startingAspect;
    let loadprogress = 0;
    let rollbackMessages = [];
    let clearRollbackMessagesTimeoutId = -1;

    const FILTERED_MESSAGES = [
      "layer_set_visible() - could not find specified layer in current room",
      "layer_tilemap_get_id() - specified tilemap not found",
      "layer_depth() - can't find specified layer",
      "draw_tilemap() - couldn't find specified tilemap",
      "layer_get_all_elements() - can't find specified layer"
    ];

    const actualDocumentTitle = document.title;
    Object.defineProperty(document, "title", { set() {}, get() { return actualDocumentTitle; } });

    canvasElement.addEventListener("click", () => canvasElement.focus());

    function ensureAspectRatio() {
      if (!canvasElement || startingHeight === undefined) return;
      canvasElement.classList.add("active");
      const maxW = window.innerWidth, maxH = window.innerHeight;
      let newW, newH;
      if (startingHeight / maxH > startingWidth / maxW) {
        newH = maxH; newW = newH * startingAspect;
      } else {
        newW = maxW; newH = newW / startingAspect;
      }
      canvasElement.style.width = newW + "px";
      canvasElement.style.height = newH + "px";
    }

    const showRollbackMessage = (message) => {
      rollbackMessages.push(message);
      messagesElement.innerHTML = rollbackMessages.map(m => `<p>${m}</p>`).join('');
      messageContainerElement.style.display = 'block';
      if (clearRollbackMessagesTimeoutId !== -1) clearTimeout(clearRollbackMessagesTimeoutId);
      clearRollbackMessagesTimeoutId = setTimeout(() => {
        clearRollbackMessagesTimeoutId = -1;
        rollbackMessages = [];
        messageContainerElement.style.display = 'none';
      }, 5000);
    };

    var Module = {
      preRun: [],
      postRun: [],
      print: (function() {
        if (outputElement) outputElement.value = "";
        return function(text) {
          if (text === "Starting WAD") loadprogress++;
          if (loadprogress === 1) Module.setStatus(text);
          else if (loadprogress >= 2) Module.setStatus("");
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
          if (!FILTERED_MESSAGES.includes(text)) console.log(text);
          if (text === "Entering main loop.") { ensureAspectRatio(); loadprogress++; }
          if (outputElement && !FILTERED_MESSAGES.includes(text)) {
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        };
      })(),
      printErr: function(text) { if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" "); console.error(text); },
      canvas: canvasElement,
      setStatus: (text) => {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
        if (text === Module.setStatus.last.text) return;
        const m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        const now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;
        if (text.includes("Downloading data...")) text = "Downloading data...";
        Module.setStatus.last = { time: now, text };
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max = parseInt(m[4]) * 100;
          progressElement.hidden = false;
          spinnerElement.hidden = false;
        } else {
          progressElement.hidden = true;
          if (!text) { spinnerElement.style.display = "none"; canvasElement.style.display = "block"; }
        }
        statusElement.innerHTML = text;
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? `Preparing... (${this.totalDependencies - left}/${this.totalDependencies})` : "All downloads complete.");
      }
    };

    Module.setStatus("Downloading...");

    window.onerror = () => {
      spinnerElement.style.display = "none";
      Module.setStatus = (text) => { if (text) Module.printErr("[post-exception status] " + text); };
    };

    if (typeof window === "object") {
      Module['arguments'] = window.location.search.substr(1).trim().split('&');
      if (!Module['arguments'][0]) Module['arguments'] = [];
    }

    const originalConsoleLog = console.log;
    console.log = function(...args) {
      originalConsoleLog.apply(console, args);
      const str = args.join(' ');
      if (str.includes("Heading back to homepage...")) window.location.href = '/';
      if (str.includes("ERROR in") && confirm("Heya! Seems like UNDERTALE Yellow has crashed! Would you like to reload the page?")) location.reload();
      if (str.includes("Toggling fullscreen...")) toggleFullscreen();

    function toggleConsole() {
      const shown = outputElement.style.display === "flex";

    async function toggleclear_site_cache() {
      if (await window.SAVEManager.confirmBox("This will clear ALL OF YOUR SAVES. Only do this if the site/game crashes repeatedly. Continue?")) {

          window.SAVEManager.showMessageBox("All site data cleared! Please reload the page.");
        } catch (e) {
          window.SAVEManager.showMessageBox("Failed to clear site data: " + e.message);
        }
      }
    }

    function toggleFullscreen() {
      const d = document, el = d.documentElement;
      if (d.fullscreenElement || d.webkitFullscreenElement || d.mozFullScreenElement || d.msFullscreenElement) {
        (d.exitFullscreen || d.webkitExitFullscreen || d.mozCancelFullScreen || d.msExitFullscreen).call(d);
      } else {
        (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
      }
    }

    (function(window) {
      const WASD = {
        enabled: false, handler: null,
        map: { w: 38, a: 37, s: 40, d: 39, W: 38, A: 37, S: 40, D: 39 },
        names: { 38: 'ArrowUp', 37: 'ArrowLeft', 40: 'ArrowDown', 39: 'ArrowRight' },
        handle(e) {
          if (!this.enabled) return;
          const t = e.target.nodeName.toLowerCase();
          if (t === 'input' || t === 'textarea' || e.target.isContentEditable) return;
          const kc = this.map[e.key];
          if (!kc) return;
          e.preventDefault(); e.stopPropagation();
          const evt = new KeyboardEvent(e.type, { key: this.names[kc], code: this.names[kc], bubbles: true, cancelable: true, composed: true });
          Object.defineProperty(evt, 'keyCode', { value: kc }); Object.defineProperty(evt, 'which', { value: kc });
          document.body.dispatchEvent(evt);
        },
        toggle(btn) {
          this.enabled = !this.enabled;
          this.handler = this.handler || this.handle.bind(this);
          if (this.enabled) {
            document.addEventListener('keydown', this.handler, true);
            document.addEventListener('keyup', this.handler, true);
          } else {
            document.removeEventListener('keydown', this.handler, true);
            document.removeEventListener('keyup', this.handler, true);
          }
          showToggleMessage(btn, this.enabled ? 'Toggled on!' : 'Toggled off!');
        }
      };
      window.toggleWASD = (btn) => WASD.toggle(btn);
    })(window);

    function showToggleMessage(button, message) {
      document.querySelectorAll('.toggle-feedback').forEach(el => el.remove());
      const rect = button.getBoundingClientRect();
      const popup = document.createElement('div');
      popup.textContent = message;
      Object.assign(popup.style, {
        position: 'absolute', backgroundColor: 'rgba(255,255,255,0.9)', color: '#1a1a1a',
        padding: '6px 12px', borderRadius: '15px', fontFamily: 'sans-serif', fontSize: '13px',
        fontWeight: 'bold', zIndex: '9999', pointerEvents: 'none', opacity: '1',
        left: `${rect.left + rect.width / 2}px`, top: `${rect.top}px`,
        transform: 'translate(-50%, -110%)', transition: 'opacity 0.4s ease-out, transform 0.4s ease-out'
      });
      document.body.appendChild(popup);
      setTimeout(() => { popup.style.opacity = '0'; popup.style.transform = 'translate(-50%, -160%)'; }, 800);
      setTimeout(() => popup.remove(), 1200);
    }

    function onFirstFrameRendered() {}

    function onGameSetWindowSize(width, height) {
      if (startingHeight === undefined && startingWidth === undefined) {
        startingHeight = height; startingWidth = width;
        startingAspect = startingWidth / startingHeight;
        ensureAspectRatio();
      }
    }

    function pause() { if (!canvasElement.classList.contains("active")) return; GM_pause(); canvasElement.classList.add("paused"); }
    function resume() { GM_unpause(); canvasElement.classList.remove("paused"); canvasElement.classList.add("unpaused"); ensureAspectRatio(); }

    function quitIfSupported() {
      if (window.oprt?.closeTab) window.oprt.closeTab();
      else if (window.chrome?.runtime?.sendMessage) window.chrome.runtime.sendMessage('mpojjmidmnpcpopbebmecmjdkdbgdeke', { command: 'closeTab' });
    }
    function enterFullscreenIfSupported() {
      if (!window.oprt?.enterFullscreen) return;
      window.oprt.enterFullscreen();
      const vs = GM_get_view_status(); vs.fullscreen = true; GM_set_view_status(vs);
    }
    function lockOrientationIfSupported() {
      if (!window.oprt?.lockPortraitOrientation || !window.oprt?.lockLandscapeOrientation) return;
      const vs = GM_get_view_status();
      if ((vs.landscape === true && vs.portrait === false) || (vs.landscape === false && vs.portrait === true)) window.oprt.lockPortraitOrientation();
    }

    new ResizeObserver(() => {
      requestAnimationFrame(ensureAspectRatio);
      setTimeout(() => requestAnimationFrame(ensureAspectRatio), 100);

    if (/Android|iPhone|iPod/i.test(navigator.userAgent)) {

    setWadLoadCallback(() => { enterFullscreenIfSupported(); lockOrientationIfSupported(); });

    window.addEventListener('load', () => {
      if ((!window.oprt?.enterFullscreen) && (!window.chrome?.runtime?.sendMessage)) {
        const qb = document.getElementById("quitButton"); if (qb) qb.hidden = true;
      }
      outputContainerElement.classList.remove('visible');
      document.querySelector('.loading').classList.add('hidden-ui');
      messageContainerElement.classList.add('hidden-ui');
      document.getElementById('closeUIButton').style.display = 'none';
      if (isMobile) document.getElementById('mobile-buttons').style.display = 'block';
      document.getElementById('fullscreen')?.addEventListener('click', toggleFullscreen);
    });

    if ("getGamepads" in navigator) {
      const sendGamepadInfo = (id) => {
        const ff = id.match(/^([0-9a-fA-F]{4})-([0-9a-fA-F]{4})-(.*)$/);
        const cr = id.match(/^(.*) ?\(.*[vV][eE][nN][dD][oO][rR]: ?([0-9a-fA-F]{4}).*[pP][rR][oO][dD][uU][cC][tT]: ?([0-9a-fA-F]{4})\)$/);
        const name = (ff?.[3] || cr?.[1] || "").toLowerCase();
        const vendor = (ff?.[1] || cr?.[2] || "").toLowerCase();
        const ps = vendor === "054c" || /dualsense|ps[1-5]|playstation|dualshock/.test(name);
        const dualsense = /dualsense|ps5/.test(name);
        window.postMessage({ gamepadIsPlaystation: ps, gamepadIsDualsense: dualsense });
      };

      window.addEventListener("gamepadconnected", (e) => sendGamepadInfo(e.gamepad.id));

      setInterval(() => {
        for (const gp of navigator.getGamepads()) {
          if (!gp) continue;
          let active = false;
          if (gp.mapping !== "standard" || gp.axes.length < 2) {
            active = gp.axes.some(a => Math.abs(a) >= 0.4) || gp.buttons.some(b => b.pressed);
          } else {
            active = Math.abs(gp.axes[0]) >= 0.4 || Math.abs(gp.axes[1]) >= 0.4 || gp.buttons.some(b => b.pressed);
          }
          if (active) { sendGamepadInfo(gp.id); break; }
        }
      }, 16);
    }

    window.SAVEManager = (() => {
      const DB_NAME = '/_savedata', STORE_NAME = 'FILE_DATA', DB_VERSION = 21;
      let db;

      function showMessageBox(message, onConfirm = null) {
        const box = document.getElementById('customMessageBox');
        const text = document.getElementById('messageBoxText');
        const btn = document.getElementById('messageBoxConfirmBtn');
        const cancel = document.getElementById('messageBoxCancelBtn');
        text.textContent = message;
        btn.textContent = 'Alright!';
        if (cancel) cancel.style.display = 'none';
        box.style.display = 'flex';
        btn.onclick = () => { box.style.display = 'none'; onConfirm?.(); };
      }

      function confirmBox(message) {
        return new Promise((resolve) => {
          const box = document.getElementById('customMessageBox');
          const text = document.getElementById('messageBoxText');
          const btn = document.getElementById('messageBoxConfirmBtn');
          let cancel = document.getElementById('messageBoxCancelBtn');
          if (!cancel) {
            cancel = document.createElement('button');
            cancel.id = 'messageBoxCancelBtn';
            cancel.style.backgroundColor = '#6c757d';
            cancel.style.marginLeft = '10px';
            btn.parentNode.appendChild(cancel);
          }
          text.textContent = message;
          btn.textContent = 'Sure!';
          cancel.textContent = 'Nah.';
          cancel.style.display = 'inline-block';
          box.style.display = 'flex';
          btn.onclick = () => { box.style.display = 'none'; resolve(true); };
          cancel.onclick = () => { box.style.display = 'none'; resolve(false); };
        });
      }

      async function openIndexedDB() {
        if (db) return db;
        if (!window.indexedDB) { showMessageBox("Your browser doesn't support IndexedDB."); throw new Error("No IndexedDB"); }
        const dbs = await window.indexedDB.databases();
        if (!dbs.some(d => d.name === DB_NAME)) throw new Error(`Database '${DB_NAME}' not found. Save in-game first!`);
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onerror = (e) => { showMessageBox("Error opening IndexedDB"); reject(e.target.error); };
          req.onsuccess = (e) => { db = e.target.result; resolve(db); };
          req.onupgradeneeded = (e) => { db = e.target.result; };
        });
      }

      async function getSaveFiles() {
        try {
          await openIndexedDB();
          const tx = db.transaction([STORE_NAME], 'readonly');
          const store = tx.objectStore(STORE_NAME);
          return new Promise((resolve, reject) => {
            const filesReq = store.getAll();
            filesReq.onsuccess = () => {
              const keysReq = store.getAllKeys();
              keysReq.onsuccess = () => resolve(filesReq.result.map((f, i) => ({ name: keysReq.result[i], data: f })));
              keysReq.onerror = (e) => reject(e.target.error);
            };
            filesReq.onerror = (e) => reject(e.target.error);
          });
        } catch (e) { showMessageBox("Failed to retrieve saves: " + e.message); return []; }
      }

      async function displaySaveFiles() {
        const list = document.getElementById('saveFileList');
        list.innerHTML = '';
        try {
          const files = await getSaveFiles();
          if (!files.length) { list.innerHTML = 'No saves found.'; return; }
          files.forEach(({ name, data }) => {
            const item = document.createElement('div');
            item.classList.add('save-file-item');
            const info = document.createElement('div');
            info.classList.add('save-file-info');
            info.innerHTML = `<span><strong>File:</strong> ${name.replace('/_savedata/', '')}</span><span><strong>Modified:</strong> ${data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A'}</span><span><strong>Size:</strong> ${data.contents?.byteLength || 0} bytes</span>`;
            const actions = document.createElement('div');
            actions.classList.add('save-file-actions');
            const dl = document.createElement('button'); dl.textContent = 'Download';
            dl.onclick = () => {
              if (!data.contents) { showMessageBox("No content to download!"); return; }
              const a = document.createElement('a');
              a.href = URL.createObjectURL(new Blob([data.contents]));
              a.download = name; document.body.appendChild(a); a.click(); a.remove();
              showMessageBox(`"${name}" downloaded.`);
            };
            const del = document.createElement('button'); del.textContent = 'Delete'; del.classList.add('delete-btn');
            del.onclick = async () => {
              if (await confirmBox(`Delete "${name}"?`)) {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                tx.objectStore(STORE_NAME).delete(name).onsuccess = () => { showMessageBox(`"${name}" deleted.`); displaySaveFiles(); };
              }
            };
            actions.append(dl, del); item.append(info, actions); list.appendChild(item);
          });
        } catch (e) { list.innerHTML = `<p style="text-align:center;color:#FA1E4E;">Error: ${e.message}</p>`; }
      }

      async function saveSaveFile(name, data) {
        await openIndexedDB();
        return new Promise((resolve, reject) => {
          const req = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).put(data, name);
          req.onsuccess = resolve;
          req.onerror = (e) => { showMessageBox("Error saving: " + e.target.error?.message); reject(e.target.error); };
        });
      }

      async function handleUpload() {
        const input = document.getElementById('uploadFileInput');
        const nameInput = document.getElementById('uploadFileNameInput');
        if (!input.files.length) { showMessageBox("Select at least one file."); return; }
        try {
          const promises = [...input.files].map(async (file) => {
            let name = (input.files.length === 1 && nameInput.value.trim()) ? nameInput.value.trim() : file.name;
            name = name.replace(/^_savedata\//, '').replace(/^\//, '');
            if (!name) return;
            return saveSaveFile(`/_savedata/${name}`, { timestamp: new Date(), mode: 33206, contents: new Uint8Array(await file.arrayBuffer()) });
          });
          await Promise.all(promises);
          showMessageBox(`${input.files.length} file(s) uploaded.`);
          input.value = ''; nameInput.value = '';
          displaySaveFiles();
        } catch (e) { showMessageBox("Upload failed: " + e.message); }
      }

      async function exportAllToZip() {
        try {
          const files = await getSaveFiles();
          if (!files.length) { showMessageBox("No saves to export."); return; }
          const zip = new JSZip();
          files.forEach(({ name, data }) => {
            if (!data.contents) return;
            zip.file(name.replace(/^\/_savedata\//, ''), data.contents instanceof Int8Array ? new Uint8Array(data.contents.buffer) : data.contents);
          });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(await zip.generateAsync({ type: 'blob' }));
          a.download = 'UNDERTALEWeb_SAVEs.zip'; document.body.appendChild(a); a.click(); a.remove();
          showMessageBox("Exported to UNDERTALEWeb_SAVEs.zip.");
        } catch (e) { showMessageBox("Export failed: " + e.message); }
      }

      async function openSAVEManager() {
        document.getElementById('saveManagerModal').style.display = 'flex';
        await displaySaveFiles();
        GM_pause();
      }

      function closeSAVEManager() { window.location.reload(); }
      function closeSMnoreload() { document.getElementById('saveManagerModal').style.display = 'none'; GM_unpause(); }

      document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('uploadFileNameInput');
        const fileInput = document.getElementById('uploadFileInput');
        fileInput?.addEventListener('change', () => {
          if (fileInput.files.length === 1) { nameInput.disabled = false; nameInput.value = fileInput.files[0].name; }
          else { nameInput.disabled = true; nameInput.value = ''; nameInput.placeholder = 'Custom filenames only for single file!'; }
        });
        if (nameInput) {
          const guard = (e) => { if (document.activeElement === nameInput) e.stopImmediatePropagation(); };
          ['keydown', 'keyup', 'keypress'].forEach(ev => window.addEventListener(ev, guard, true));
        }
      });

      return { openSAVEManager, closeSAVEManager, closeSMnoreload, handleUpload, showMessageBox, confirmBox, openIndexedDB, exportAllToZip };
    })();

    window.addEventListener('load', async () => { try { await window.SAVEManager.openIndexedDB(); } catch (e) {} });


  </script>

  <script async src="runner.js"></script>
  <script src="joy.js"></script>
  <script src="mobile.js"></script>
  <script src="cooker.js"></script>
</body>
