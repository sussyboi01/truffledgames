<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<title>Go To Bed web port</title>
		<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no" />
		<style>
			html, body {
				margin: 0;
				padding: 0;
				overflow: hidden;
				height: 100%;
				width: 100%;
			}
			canvas {
				display: block;
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background: #26251e;
			}
			::-webkit-scrollbar {
				display: none;
			}
		</style>
	</head>
	<body>
		<canvas
			id="unity-canvas"
			width="100vw"
			height="100vh"
			tabindex="-1"
		></canvas>

		<script src="Build/GTBPort.loader.js"></script>
		<script>
			createUnityInstance(document.querySelector("#unity-canvas"), {
				dataUrl: "Build/GTBPort.data",
				frameworkUrl: "Build/GTBPort.framework.js",
				codeUrl: "Build/GTBPort.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Joseph Mularczyk",
				productName: "Go To Bed",
				productVersion: "1.0",
			});
		</script>
	</body>
</html>
