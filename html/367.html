<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('cors.js').then(function(reg) {
        if (reg.active && !window.crossOriginIsolated) location.reload();
      });
    }
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boundy</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060a;
      --surface: #0d0d12;
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.08);
      --text: #e4e4e7;
      --muted: #52525b;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: lowercase;
    }

    .launcher {
      text-align: center;
      animation: enter .6s cubic-bezier(.16,1,.3,1);
    }

    .brand {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .12em;
      margin-bottom: 32px;
    }

    .brand span { color: var(--green); }

    .bar-wrap {
      width: 280px;
      height: 4px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
      margin: 0 auto 14px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 99px;
      transition: width .25s ease;
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    canvas {
      display: none;
      position: fixed;
      inset: 0;
      width: 100vw !important;
      height: 100vh !important;
      background: #000;
      z-index: 100;
    }

    canvas.show { display: block; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="launcher" id="launcher">
    <div class="brand"><span>▸</span> boundy</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
    <div class="status" id="status">fetching packed.pak...</div>
  </div>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

  <script>
    var bar = document.getElementById('bar');
    var status = document.getElementById('status');
    var launcher = document.getElementById('launcher');
    var canvas = document.getElementById('canvas');

    var Module = {
      preRun: [],
      postRun: [],
      noInitialRun: true,
      canvas: canvas,
      isRuntimeInitialized: false,
      print: function(t) { console.log(t); },
      printErr: function(t) { console.error(t); },
      onRuntimeInitialized: function() {
        Module.isRuntimeInitialized = true;
        if (Module._pendingMain) {
          Module._pendingMain();
          Module._pendingMain = null;
        }
      },
      callMain: function(args) {
        if (!Module.isRuntimeInitialized) {
          Module._pendingMain = function() {
            if (typeof Module['run'] === 'function')
              setTimeout(function() { Module['run'](args); }, 10);
          };
        } else {
          if (typeof Module['run'] === 'function') Module['run'](args);
        }
      }
    };

    async function go() {
      var res = await fetch('packed.pak');
      if (!res.ok) { status.textContent = 'failed to fetch packed.pak'; return; }

      var total = parseInt(res.headers.get('content-length') || '0', 10);
      var reader = res.body.getReader();
      var chunks = [];
      var loaded = 0;

      while (true) {
        var result = await reader.read();
        if (result.done) break;
        chunks.push(result.value);
        loaded += result.value.length;
        var pct = total > 0 ? Math.round((loaded / total) * 80) : 0;
        bar.style.width = pct + '%';
        status.textContent = 'downloading ' + pct + '%';
      }

      status.textContent = 'writing to filesystem...';
      bar.style.width = '85%';

      var fs = Module.FS;

      ['/uploads', '/storage', '/mods', '/overrides', '/storage/logs'].forEach(function(d) {
        if (!fs.analyzePath(d).exists) fs.mkdir(d);
      });

      fs.writeFile('/overrides/preload.config', JSON.stringify([
        { type: 'json', path: '/player.config:inventoryFilters' }
      ]));

      var stream = fs.open('/uploads/packed.pak', 'w+');
      var offset = 0;
      for (var i = 0; i < chunks.length; i++) {
        fs.write(stream, chunks[i], 0, chunks[i].length, offset);
        offset += chunks[i].length;
      }
      fs.close(stream);

      fs.writeFile('/sbinit.config', JSON.stringify({
        assetDirectories: ['/mods'],
        assetSources: ['/overrides', '/uploads/packed.pak'],
        storageDirectory: '/storage',
        logDirectory: '/storage/logs',
        logFileBackups: 1,
        assetsSettings: { workerPoolSize: 0 }
      }, null, 2));

      bar.style.width = '90%';
      status.textContent = 'waiting for engine...';

      await new Promise(function(resolve) {
        if (Module.isRuntimeInitialized) return resolve();
        var old = Module.onRuntimeInitialized;
        Module.onRuntimeInitialized = function() { if (old) old(); resolve(); };
      });

      bar.style.width = '100%';
      status.textContent = 'launching...';

      setTimeout(function() {
        launcher.style.opacity = '0';
        launcher.style.transition = 'opacity .4s ease';

        setTimeout(function() {
          launcher.style.display = 'none';
          canvas.classList.add('show');
          canvas.focus();
          Module.callMain([]);
        }, 400);
      }, 300);
    }

    go();
  </script>
  <script async src="starbound.js"></script>
</body>
</html>
