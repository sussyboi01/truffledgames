<!DOCTYPE html>
<html>
<head>
	<title>Quasar PSP Loader</title>
	<meta charset="UTF-8">
	<style>
		body {
			overflow: hidden;
			background: #000;
			margin: 0;
			color: #fff;
			font-family: sans-serif;
		}
		#loadingText {
			text-align: center;
			font-size: 48px;
			margin-top: 40vh;
		}
	</style>
</head>
<body>
	<h1 id="loadingText">LOADING (0/13)</h1>
	<div style="width:100vw;height:100vh;">
		<div id="game" style="display:none;"></div>
	</div>
	<script>
		function mergeFiles(fileParts) {
			return new Promise((resolve, reject) => {
				let buffers = [];

				function fetchPart(index) {
					if (index >= fileParts.length) {
						const blob = new Blob(buffers);
						resolve(URL.createObjectURL(blob));
						return;
					}
					fetch(fileParts[index])
						.then(r => r.arrayBuffer())
						.then(data => {
							buffers.push(data);
							document.getElementById("loadingText").textContent =
								`LOADING (${index + 1}/13)`;
							fetchPart(index + 1);
						})
						.catch(reject);
				}
				fetchPart(0);
			});
		}
		function getParts(file, start, end) {
			let parts = [];
			for (let i = start; i <= end; i++) {
			parts.push(file + ".part" + i);
		}
		return parts;
		}
		mergeFiles(getParts("game.zip", 1, 13)).then(gameUrl => {
			document.getElementById("loadingText").remove();
			const gameDiv = document.getElementById("game");
			gameDiv.style.display = "block";
			window.EJS_player = "#game";
			window.EJS_core = "psp";
			window.EJS_gameID = "quasar-psp-lbp"; 
			window.EJS_threads = "auto"; 
			window.EJS_gameUrl = gameUrl;
			window.EJS_pathtodata = "/extra/data/";
			const script = document.createElement("script");
			script.src = "/extra/data/loader.js";
			document.body.appendChild(script);
		});
	</script>
</body>
</html>
